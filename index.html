<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Onyx — Productivity, refined</title>
<meta name="description" content="A minimalist habit tracker, to-do list, daily planner, goal tracker and notes app in one quiet, elegant workspace.">
<style>
/* ==========================================================================
   ONYX — DESIGN TOKENS
   A grayscale, glass-and-light system. Dark is the "ink" theme (default),
   Light is the "paper" theme. Every color in the app derives from here.
   ========================================================================== */
:root{
  /* -- core grayscale ramp (dark / "ink") -- */
  --c-bg:            #08080a;
  --c-bg-soft:       #0c0c0f;
  --c-surface:       #131316;
  --c-surface-2:     #191a1e;
  --c-surface-3:     #212226;
  --c-glass:         rgba(255,255,255,0.045);
  --c-glass-strong:  rgba(255,255,255,0.075);
  --c-glass-border:  rgba(255,255,255,0.09);
  --c-border:        rgba(255,255,255,0.08);
  --c-border-strong: rgba(255,255,255,0.16);
  --c-text:          #f3f3f5;
  --c-text-dim:      #a6a6ad;
  --c-text-faint:    #6c6c74;
  --c-white:         #ffffff;
  --c-black:         #000000;
  --c-overlay:       rgba(4,4,6,0.66);
  --c-danger:        #e6e6ea;   /* kept grayscale on purpose */
  --c-danger-bg:     rgba(255,255,255,0.08);

  /* -- shadows -- */
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:  0 8px 24px -8px rgba(0,0,0,0.55);
  --shadow-lg:  0 24px 64px -16px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 0 1px rgba(255,255,255,0.06), 0 12px 32px -12px rgba(0,0,0,0.6);
  --ring-glow:  0 0 0 3px rgba(255,255,255,0.08);

  /* -- radii -- */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-full: 999px;

  /* -- type -- */
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;

  /* -- motion -- */
  --ease: cubic-bezier(.22,1,.36,1);
  --ease-soft: cubic-bezier(.4,0,.2,1);
  --dur-fast: 150ms;
  --dur-med: 280ms;
  --dur-slow: 520ms;

  /* -- layout -- */
  --sidebar-w: 248px;
  --sidebar-w-collapsed: 84px;
  --topbar-h: 76px;
}

html[data-theme="light"]{
  --c-bg:            #f6f6f4;
  --c-bg-soft:       #efefec;
  --c-surface:       #ffffff;
  --c-surface-2:     #fbfbf9;
  --c-surface-3:     #f0f0ed;
  --c-glass:         rgba(255,255,255,0.55);
  --c-glass-strong:  rgba(255,255,255,0.78);
  --c-glass-border:  rgba(20,20,18,0.07);
  --c-border:        rgba(20,20,18,0.09);
  --c-border-strong: rgba(20,20,18,0.16);
  --c-text:          #17171a;
  --c-text-dim:      #5c5c62;
  --c-text-faint:    #93939a;
  --c-white:         #ffffff;
  --c-black:         #000000;
  --c-overlay:       rgba(20,20,18,0.28);
  --c-danger:        #17171a;
  --c-danger-bg:     rgba(20,20,18,0.06);

  --shadow-sm:  0 1px 2px rgba(20,20,18,0.06);
  --shadow-md:  0 8px 24px -10px rgba(20,20,18,0.14);
  --shadow-lg:  0 24px 56px -20px rgba(20,20,18,0.18);
  --shadow-glow: 0 0 0 1px rgba(20,20,18,0.05), 0 12px 32px -14px rgba(20,20,18,0.16);
  --ring-glow:  0 0 0 3px rgba(20,20,18,0.06);
}

/* ==========================================================================
   RESET
   ========================================================================== */
*,*::before,*::after{ box-sizing: border-box; }
*{ margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; }
body{
  font-family: var(--font-sans);
  background: var(--c-bg);
  color: var(--c-text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  transition: background var(--dur-med) var(--ease-soft), color var(--dur-med) var(--ease-soft);
}
img,svg{ display:block; max-width:100%; }
button, input, textarea, select{ font: inherit; color: inherit; }
button{ background:none; border:none; cursor:pointer; }
a{ color:inherit; text-decoration:none; }
ul,ol{ list-style:none; }
input,textarea,select{ background:none; border:none; outline:none; }
::selection{ background: rgba(255,255,255,0.18); }
html[data-theme="light"] ::selection{ background: rgba(20,20,18,0.14); }

/* scrollbars */
*{ scrollbar-width: thin; scrollbar-color: var(--c-border-strong) transparent; }
*::-webkit-scrollbar{ width:8px; height:8px; }
*::-webkit-scrollbar-track{ background:transparent; }
*::-webkit-scrollbar-thumb{ background: var(--c-border-strong); border-radius: var(--r-full); }
*::-webkit-scrollbar-thumb:hover{ background: var(--c-text-faint); }

/* focus visibility */
:focus-visible{ outline: 2px solid var(--c-text-dim); outline-offset: 2px; border-radius: var(--r-xs); }

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}

/* ==========================================================================
   AMBIENT GRAIN — signature texture layer, pure grayscale, very low opacity
   ========================================================================== */
.grain{
  position: fixed; inset: 0; pointer-events: none; z-index: 2;
  opacity: 0.05; mix-blend-mode: overlay;
}
html[data-theme="light"] .grain{ opacity: 0.035; }
.grain svg{ width:100%; height:100%; }

.ambient-glow{
  position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
  width: 900px; height: 700px; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.05), transparent 65%);
  filter: blur(10px);
}
html[data-theme="light"] .ambient-glow{ background: radial-gradient(ellipse at center, rgba(20,20,18,0.035), transparent 65%); }

/* ==========================================================================
   APP LAYOUT
   ========================================================================== */
.app{ display:flex; min-height:100vh; position:relative; z-index:1; }

/* -- Sidebar -- */
.sidebar{
  width: var(--sidebar-w);
  flex-shrink:0;
  height: 100vh;
  position: sticky; top:0;
  display:flex; flex-direction:column;
  padding: 22px 16px 18px;
  border-right: 1px solid var(--c-border);
  background: var(--c-bg-soft);
  transition: width var(--dur-med) var(--ease-soft), background var(--dur-med) var(--ease-soft), border-color var(--dur-med) var(--ease-soft);
  z-index: 20;
}
.brand{
  display:flex; align-items:center; gap:10px;
  padding: 6px 10px 22px;
}
.brand-mark{
  width:30px; height:30px; border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--c-text) 0%, var(--c-text-faint) 100%);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow: var(--shadow-sm);
}
.brand-mark span{
  font-family: var(--font-sans); font-weight:700; font-size:14px; color: var(--c-bg); letter-spacing: -0.02em;
}
.brand-name{ font-size:16px; font-weight:600; letter-spacing:-0.01em; white-space:nowrap; }
.brand-tag{ font-size:10.5px; color: var(--c-text-faint); letter-spacing:0.04em; white-space:nowrap; margin-top:1px; }

.nav-rail{ position:relative; display:flex; flex-direction:column; gap:2px; padding: 6px 0; }
.nav-highlight{
  position:absolute; left:0; width:100%; height:44px;
  background: var(--c-glass-strong);
  border: 1px solid var(--c-glass-border);
  border-radius: var(--r-md);
  transition: transform var(--dur-med) var(--ease), opacity var(--dur-fast);
  box-shadow: var(--shadow-sm);
  pointer-events:none;
  opacity:0;
}
.nav-item{
  position:relative; z-index:1;
  display:flex; align-items:center; gap:12px;
  height:44px; padding: 0 12px;
  border-radius: var(--r-md);
  color: var(--c-text-dim);
  font-size:13.5px; font-weight:500; letter-spacing:-0.005em;
  transition: color var(--dur-fast) var(--ease-soft);
  white-space:nowrap;
}
.nav-item:hover{ color: var(--c-text); }
.nav-item.active{ color: var(--c-text); font-weight:600; }
.nav-item .icon{ width:18px; height:18px; flex-shrink:0; stroke: currentColor; }
.nav-item .count{
  margin-left:auto; font-size:11px; font-weight:600; color: var(--c-text-faint);
  background: var(--c-glass); border:1px solid var(--c-border); border-radius: var(--r-full);
  padding: 1px 7px;
}

.sidebar-footer{ margin-top:auto; display:flex; flex-direction:column; gap:6px; padding-top:14px; border-top:1px solid var(--c-border); }
.sidebar-btn{
  display:flex; align-items:center; gap:10px; height:38px; padding:0 12px;
  border-radius: var(--r-sm); color: var(--c-text-dim); font-size:12.5px; font-weight:500;
  transition: background var(--dur-fast), color var(--dur-fast);
}
.sidebar-btn:hover{ background: var(--c-glass); color: var(--c-text); }
.sidebar-btn .icon{ width:16px; height:16px; stroke:currentColor; flex-shrink:0; }
.sidebar-btn kbd{
  margin-left:auto; font-family: var(--font-mono); font-size:10px; color: var(--c-text-faint);
  border:1px solid var(--c-border); border-radius:4px; padding:1px 5px;
}

/* -- Main -- */
.main{ flex:1; min-width:0; display:flex; flex-direction:column; position:relative; }

.topbar{
  position: sticky; top:0; z-index:15;
  height: var(--topbar-h);
  display:flex; align-items:center; gap:16px;
  padding: 0 32px;
  background: linear-gradient(to bottom, var(--c-bg) 60%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.topbar-title-group{ display:flex; flex-direction:column; gap:2px; margin-right:auto; }
.topbar-eyebrow{ font-size:11px; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color: var(--c-text-faint); }
.topbar-title{ font-size:21px; font-weight:600; letter-spacing:-0.02em; }

.icon-btn{
  width:38px; height:38px; border-radius: var(--r-sm);
  display:flex; align-items:center; justify-content:center;
  color: var(--c-text-dim);
  border: 1px solid transparent;
  transition: all var(--dur-fast) var(--ease-soft);
  flex-shrink:0;
}
.icon-btn:hover{ background: var(--c-glass); color: var(--c-text); border-color: var(--c-border); }
.icon-btn .icon{ width:17px; height:17px; stroke:currentColor; }
.icon-btn.active{ background: var(--c-glass-strong); color: var(--c-text); border-color: var(--c-border); }

.search-trigger{
  display:flex; align-items:center; gap:9px;
  height:38px; padding: 0 12px 0 12px; min-width: 200px;
  border-radius: var(--r-sm); border:1px solid var(--c-border);
  background: var(--c-glass); color: var(--c-text-faint);
  font-size:12.5px; transition: all var(--dur-fast) var(--ease-soft);
}
.search-trigger:hover{ border-color: var(--c-border-strong); color: var(--c-text-dim); }
.search-trigger .icon{ width:15px; height:15px; stroke:currentColor; flex-shrink:0; }
.search-trigger kbd{
  margin-left:auto; font-family: var(--font-mono); font-size:10px;
  border:1px solid var(--c-border); border-radius:4px; padding:1px 5px;
}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  height:38px; padding: 0 16px;
  border-radius: var(--r-sm);
  font-size:13px; font-weight:600; letter-spacing:-0.005em;
  transition: all var(--dur-fast) var(--ease-soft);
  border: 1px solid transparent;
  white-space:nowrap;
}
.btn .icon{ width:15px; height:15px; stroke:currentColor; }
.btn-primary{ background: var(--c-text); color: var(--c-bg); box-shadow: var(--shadow-sm); }
.btn-primary:hover{ transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-primary:active{ transform: translateY(0); }
.btn-ghost{ background: var(--c-glass); color: var(--c-text); border-color: var(--c-border); }
.btn-ghost:hover{ background: var(--c-glass-strong); border-color: var(--c-border-strong); }
.btn-text{ color: var(--c-text-dim); height:34px; padding:0 10px; }
.btn-text:hover{ color: var(--c-text); }
.btn-sm{ height:30px; padding:0 12px; font-size:12px; }
.btn-danger{ background: var(--c-danger-bg); color: var(--c-text); border-color: var(--c-border); }
.btn-block{ width:100%; }
.btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none !important; }

/* ==========================================================================
   VIEW CONTAINER
   ========================================================================== */
.view-container{ flex:1; padding: 8px 32px 64px; }
.view{ display:none; animation: viewIn var(--dur-slow) var(--ease); }
.view.active{ display:block; }
@keyframes viewIn{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform:none; } }

.section-heading{ display:flex; align-items:baseline; justify-content:space-between; margin: 28px 0 14px; }
.section-heading h3{ font-size:14px; font-weight:600; letter-spacing:-0.005em; }
.section-heading .muted-link{ font-size:12px; color: var(--c-text-faint); font-weight:500; }
.section-heading .muted-link:hover{ color: var(--c-text-dim); }

/* ==========================================================================
   GLASS CARD / PANEL PRIMITIVES
   ========================================================================== */
.panel{
  background: var(--c-glass);
  border: 1px solid var(--c-glass-border);
  border-radius: var(--r-lg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow-sm);
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast), transform var(--dur-fast);
}
.panel-solid{
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}

.empty-state{
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  padding: 56px 24px; gap:12px; color: var(--c-text-faint);
}
.empty-state .icon{ width:34px; height:34px; stroke: var(--c-text-faint); opacity:0.7; }
.empty-state p{ font-size:13px; max-width:280px; line-height:1.5; }
.empty-state .btn{ margin-top:6px; }

/* ==========================================================================
   FORM ELEMENTS (shared across modals)
   ========================================================================== */
.field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.field label{ font-size:11.5px; font-weight:600; color: var(--c-text-faint); letter-spacing:0.03em; text-transform:uppercase; }
.field input[type="text"], .field input[type="date"], .field input[type="time"], .field input[type="number"], .field textarea, .field select{
  background: var(--c-surface-2); border:1px solid var(--c-border); border-radius: var(--r-sm);
  padding: 10px 12px; font-size:13.5px; color: var(--c-text); transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
  width:100%;
}
.field select{ appearance:none; -webkit-appearance:none; background-image: none; cursor:pointer; }
.field input:focus, .field textarea:focus, .field select:focus{ border-color: var(--c-border-strong); box-shadow: var(--ring-glow); }
.field textarea{ resize:vertical; min-height:70px; line-height:1.5; font-family: var(--font-sans); }
.field-row{ display:flex; gap:12px; }
.field-row .field{ flex:1; }
.field-hint{ font-size:11px; color: var(--c-text-faint); }

.chip-group{ display:flex; flex-wrap:wrap; gap:7px; }
.chip{
  display:inline-flex; align-items:center; gap:6px;
  padding: 7px 13px; border-radius: var(--r-full);
  border:1px solid var(--c-border); background: var(--c-surface-2);
  font-size:12px; font-weight:500; color: var(--c-text-dim);
  transition: all var(--dur-fast) var(--ease-soft);
}
.chip:hover{ border-color: var(--c-border-strong); color:var(--c-text); }
.chip.selected{ background: var(--c-text); color: var(--c-bg); border-color: var(--c-text); font-weight:600; }
.chip .dot{ width:7px; height:7px; border-radius:50%; background: currentColor; }

/* priority dots — grayscale coded: low(faint) / medium(dim) / high(solid+ring) */
.priority-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.priority-dot.low{ background: var(--c-text-faint); }
.priority-dot.medium{ background: var(--c-text-dim); }
.priority-dot.high{ background: var(--c-text); box-shadow: 0 0 0 3px var(--c-glass-strong); }

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */
.mobile-nav{ display:none; }

@media (max-width: 1080px){
  :root{ --sidebar-w: 216px; }
}

@media (max-width: 860px){
  .sidebar{ display:none; }
  .topbar{ padding: 0 18px; }
  .view-container{ padding: 4px 18px 96px; }
  .mobile-nav{
    display:flex; position: fixed; bottom:0; left:0; right:0; z-index:30;
    justify-content:space-around; align-items:center;
    padding: 8px 10px calc(10px + env(safe-area-inset-bottom));
    background: var(--c-glass-strong); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-top:1px solid var(--c-border);
  }
  .mobile-nav-item{ display:flex; flex-direction:column; align-items:center; gap:3px; color: var(--c-text-faint); padding:6px 10px; border-radius: var(--r-sm); transition: color var(--dur-fast); }
  .mobile-nav-item.active{ color: var(--c-text); }
  .mobile-nav-item .icon{ width:20px; height:20px; stroke: currentColor; }
  .mobile-nav-item span{ font-size:9.5px; font-weight:600; letter-spacing:0.01em; }
  .search-trigger{ min-width:0; width:38px; padding:0; justify-content:center; }
  .search-trigger span, .search-trigger kbd{ display:none; }
}

@media (max-width: 560px){
  .topbar-title{ font-size:18px; }
  .btn span.label-full{ display:none; }
}

/* ==========================================================================
   MODAL
   ========================================================================== */
.modal-overlay{
  position: fixed; inset:0; z-index:100;
  background: var(--c-overlay);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display:flex; align-items:center; justify-content:center;
  padding: 24px;
  opacity:0; pointer-events:none;
  transition: opacity var(--dur-med) var(--ease-soft);
}
.modal-overlay.open{ opacity:1; pointer-events:auto; }
.modal{
  width:100%; max-width:520px; max-height:88vh; overflow:auto;
  background: var(--c-surface); border:1px solid var(--c-border-strong);
  border-radius: var(--r-lg); box-shadow: var(--shadow-lg);
  transform: translateY(14px) scale(0.98); opacity:0;
  transition: transform var(--dur-med) var(--ease), opacity var(--dur-med) var(--ease);
}
.modal-overlay.open .modal{ transform:none; opacity:1; }
.modal-header{
  display:flex; align-items:center; justify-content:space-between;
  padding: 20px 22px; border-bottom:1px solid var(--c-border); position:sticky; top:0;
  background: var(--c-surface); z-index:2;
}
.modal-header h2{ font-size:16px; font-weight:600; letter-spacing:-0.01em; }
.modal-body{ padding: 20px 22px; }
.modal-footer{ display:flex; align-items:center; justify-content:flex-end; gap:10px; padding: 16px 22px; border-top:1px solid var(--c-border); position:sticky; bottom:0; background: var(--c-surface); }
.modal-footer .footer-left{ margin-right:auto; }

/* ==========================================================================
   COMMAND PALETTE
   ========================================================================== */
.cmdk-overlay{
  position: fixed; inset:0; z-index:110;
  background: var(--c-overlay); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display:flex; align-items:flex-start; justify-content:center;
  padding: 12vh 20px 20px;
  opacity:0; pointer-events:none; transition: opacity var(--dur-fast) var(--ease-soft);
}
.cmdk-overlay.open{ opacity:1; pointer-events:auto; }
.cmdk{
  width:100%; max-width:560px; max-height:60vh; display:flex; flex-direction:column;
  background: var(--c-surface); border:1px solid var(--c-border-strong); border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg); overflow:hidden;
  transform: translateY(-10px) scale(0.98); opacity:0;
  transition: transform var(--dur-med) var(--ease), opacity var(--dur-med) var(--ease);
}
.cmdk-overlay.open .cmdk{ transform:none; opacity:1; }
.cmdk-input-row{ display:flex; align-items:center; gap:10px; padding: 16px 18px; border-bottom:1px solid var(--c-border); }
.cmdk-input-row .icon{ width:17px; height:17px; stroke: var(--c-text-faint); flex-shrink:0; }
.cmdk-input-row input{ flex:1; font-size:15px; background:none; border:none; outline:none; color: var(--c-text); }
.cmdk-input-row input::placeholder{ color: var(--c-text-faint); }
.cmdk-input-row kbd{ font-family: var(--font-mono); font-size:10.5px; color: var(--c-text-faint); border:1px solid var(--c-border); border-radius:4px; padding:2px 6px; }
.cmdk-results{ overflow-y:auto; padding: 8px; }
.cmdk-group-label{ font-size:10.5px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color: var(--c-text-faint); padding: 10px 10px 6px; }
.cmdk-item{
  display:flex; align-items:center; gap:11px; padding: 10px 11px; border-radius: var(--r-sm);
  font-size:13px; color: var(--c-text-dim); cursor:pointer; transition: background var(--dur-fast);
}
.cmdk-item .icon{ width:15px; height:15px; stroke:currentColor; flex-shrink:0; }
.cmdk-item .cmdk-item-hint{ margin-left:auto; font-size:11px; color: var(--c-text-faint); }

.goal-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:10px; border-top:1px solid var(--c-border); }
.goal-date{ font-size:11px; color: var(--c-text-faint); display:flex; align-items:center; gap:5px; }
.goal-date .icon{ width:12px; height:12px; stroke:currentColor; }
.goal-date.urgent{ color: var(--c-text); font-weight:600; }
.goal-card.completed{ opacity:0.55; }
.goal-card.completed .goal-title{ text-decoration: line-through; }

/* ==========================================================================
   NOTES
   ========================================================================== */
.notes-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:14px; }
.note-card{ padding:18px; display:flex; flex-direction:column; gap:10px; cursor:pointer; min-height:150px; }
.note-card:hover{ border-color: var(--c-border-strong); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.note-card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.note-title{ font-size:14px; font-weight:600; letter-spacing:-0.005em; flex:1; }
.note-pin{ color: var(--c-text-faint); flex-shrink:0; }
.note-pin.pinned{ color: var(--c-text); }
.note-pin .icon{ width:15px; height:15px; stroke:currentColor; fill:none; }
.note-pin.pinned .icon{ fill: currentColor; }
.note-preview{ font-size:12px; color: var(--c-text-faint); line-height:1.6; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; }
.note-card-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
.note-cat{ font-size:10px; color: var(--c-text-faint); background: var(--c-glass); border:1px solid var(--c-border); padding:2px 8px; border-radius: var(--r-full); }
.note-date{ font-size:10.5px; color: var(--c-text-faint); }

.note-editor{ display:flex; flex-direction:column; gap:12px; }
.note-editor-title{ width:100%; font-size:18px; font-weight:600; background:none; border:none; outline:none; color: var(--c-text); }
.note-editor-title::placeholder{ color: var(--c-text-faint); }
.note-editor-tabs{ display:flex; gap:6px; }
.note-editor-tab{ padding:6px 12px; border-radius: var(--r-full); font-size:11.5px; font-weight:600; color: var(--c-text-faint); border:1px solid var(--c-border); }
.note-editor-tab.active{ background: var(--c-text); color: var(--c-bg); border-color: var(--c-text); }
.note-editor-area{ width:100%; min-height:280px; background: var(--c-surface-2); border:1px solid var(--c-border); border-radius: var(--r-sm); padding:14px; font-size:13.5px; line-height:1.7; resize:vertical; font-family: var(--font-mono); }
.note-editor-area:focus{ border-color: var(--c-border-strong); }
.note-preview-render{ min-height:280px; background: var(--c-surface-2); border:1px solid var(--c-border); border-radius: var(--r-sm); padding:16px 18px; font-size:13.5px; line-height:1.75; overflow:auto; }
.note-preview-render h1,.note-preview-render h2,.note-preview-render h3{ margin: 14px 0 8px; font-weight:700; letter-spacing:-0.01em; }
.note-preview-render h1{ font-size:20px; } .note-preview-render h2{ font-size:17px; } .note-preview-render h3{ font-size:14px; }
.note-preview-render p{ margin: 8px 0; }
.note-preview-render ul{ margin: 8px 0 8px 20px; list-style: disc; }
.note-preview-render blockquote{ border-left:3px solid var(--c-border-strong); padding-left:12px; color: var(--c-text-faint); margin: 10px 0; }
.note-preview-render code{ background: var(--c-surface-3); padding:1px 6px; border-radius:4px; font-family: var(--font-mono); font-size:0.92em; }
.note-preview-render strong{ font-weight:700; } .note-preview-render em{ font-style:italic; }

/* ==========================================================================

/* progress ring draw-in */
@keyframes ringDraw{ from{ stroke-dashoffset: var(--ring-full, 220); } }
.ring-fill.animate, .fill.animate{ animation: ringDraw 1.1s var(--ease) both; }

<script>
'use strict';
/* ==========================================================================
   ONYX — APPLICATION LOGIC
   Modules: Utils · Icons · Store · Theme · Toast · Modal · Nav ·
            CommandPalette · Dashboard · Habits · Tasks · Planner ·
            Goals · Notes · Seed · Init
   ========================================================================== */

/* ---------------------------------------------------------------------- *
 * UTILS — small pure helpers used across every module
 * ---------------------------------------------------------------------- */
const Utils = (() => {
  const pad = n => String(n).padStart(2, '0');

  /** YYYY-MM-DD for a Date in LOCAL time (never UTC, avoids off-by-one bugs) */
  function dateKey(d = new Date()){
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function keyToDate(key){
    const [y,m,d] = key.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function addDays(key, n){
    const d = keyToDate(key);
    d.setDate(d.getDate()+n);
    return dateKey(d);
  }
  function isToday(key){ return key === dateKey(new Date()); }
  function isPast(key){ return key < dateKey(new Date()); }

  const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DOW_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS    = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function friendlyDate(key){
    const d = keyToDate(key);
    return `${DOW_LONG[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }
  function shortDate(key){
    const d = keyToDate(key);
    return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  }
  function relativeDay(key){
    const today = dateKey(new Date());
    if(key === today) return 'Today';
    if(key === addDays(today,-1)) return 'Yesterday';
    if(key === addDays(today,1)) return 'Tomorrow';
    return shortDate(key);
  }
  /** Human-friendly "in 3 days" / "5 days ago" / "today" for goal target dates */
  function daysUntil(key){
    const today = keyToDate(dateKey(new Date()));
    const target = keyToDate(key);
    const diff = Math.round((target - today) / 86400000);
    return diff;
  }
  function dueLabel(key){
    const diff = daysUntil(key);
    if(diff === 0) return 'Due today';
    if(diff === 1) return 'Due tomorrow';
    if(diff === -1) return 'Overdue 1 day';
    if(diff < 0) return `Overdue ${Math.abs(diff)} days`;
    if(diff <= 7) return `Due in ${diff} days`;
    return `Due ${shortDate(key)}`;
  }

  function uid(prefix='id'){
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
  }

  /** Escape user text before it ever touches innerHTML */
  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, m => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[m]));
  }

  function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
  function pct(part, whole){ return whole > 0 ? clamp(Math.round((part/whole)*100), 0, 100) : 0; }

  /** Animate a number from 0 (or current) to target — used on stat cards */
  function animateCount(el, target, opts={}){
    const dur = opts.duration || 700;
    const isPercent = !!opts.percent;
    const decimals = opts.decimals || 0;
    const start = 0;
    const t0 = performance.now();
    function frame(now){
      const p = clamp((now - t0) / dur, 0, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const val = start + (target - start) * eased;
      el.textContent = decimals ? val.toFixed(decimals) : Math.round(val);
      if(isPercent) el.textContent += '%';
      if(p < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  /** Debounce for search inputs */
  function debounce(fn, wait=200){
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
  }

  /** Minimal, safe markdown-lite renderer: headers, bold, italic, lists,
   *  blockquotes, inline code, checkboxes, line breaks. No HTML passthrough. */
  function renderMarkdown(raw){
    const lines = escapeHtml(raw || '').split('\n');
    let html = '';
    let inList = false;
    for(let line of lines){
      if(/^###\s+/.test(line)){ closeList(); html += `<h3>${line.replace(/^###\s+/,'')}</h3>`; continue; }
      if(/^##\s+/.test(line)){ closeList(); html += `<h2>${line.replace(/^##\s+/,'')}</h2>`; continue; }
      if(/^#\s+/.test(line)){ closeList(); html += `<h1>${line.replace(/^#\s+/,'')}</h1>`; continue; }
      if(/^&gt;\s?/.test(line)){ closeList(); html += `<blockquote>${line.replace(/^&gt;\s?/,'')}</blockquote>`; continue; }
      if(/^[-*]\s+\[( |x|X)\]\s+/.test(line)){
        openList();
        const checked = /\[(x|X)\]/.test(line);
        const txt = line.replace(/^[-*]\s+\[( |x|X)\]\s+/,'');
        html += `<li style="list-style:none;margin-left:-20px;">${checked?'☑':'☐'} ${inline(txt)}</li>`;
        continue;
      }
      if(/^[-*]\s+/.test(line)){ openList(); html += `<li>${inline(line.replace(/^[-*]\s+/,''))}</li>`; continue; }
      closeList();
      if(line.trim() === ''){ continue; }
      html += `<p>${inline(line)}</p>`;
    }
    closeList();
    return html;

    function openList(){ if(!inList){ html += '<ul>'; inList = true; } }
    function closeList(){ if(inList){ html += '</ul>'; inList = false; } }
    function inline(t){
      return t
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
    }
  }

  return {
    pad, dateKey, keyToDate, addDays, isToday, isPast,
    DOW_SHORT, DOW_LONG, MONTHS,
    friendlyDate, shortDate, relativeDay, daysUntil, dueLabel,
    uid, escapeHtml, clamp, pct, animateCount, debounce, renderMarkdown
  };
})();

/* ---------------------------------------------------------------------- *
 * ICONS — tiny inline SVG library, all stroke=currentColor (grayscale-safe)
 * ---------------------------------------------------------------------- */
const Icons = (() => {
  const base = (paths, vb='0 0 24 24') => `<svg class="icon" viewBox="${vb}" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
  const lib = {
    plus:      base('<path d="M12 5v14M5 12h14"/>'),
    trash:     base('<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/><path d="M10 11v6M14 11v6"/>'),

/* ---------------------------------------------------------------------- *
 * STORE — single source of truth + localStorage persistence.
 * NOTE: this file is designed to be downloaded/hosted (e.g. GitHub Pages)
 * and run as a real standalone page, where localStorage is fully
 * supported. (It will not persist inside a sandboxed preview iframe.)
 * ---------------------------------------------------------------------- */
const Store = (() => {
  const KEY = 'onyx_productivity_state_v1';
  const listeners = [];

  function defaultState(){
    return {
      theme: 'dark',
      activeView: 'dashboard',
      selectedPlannerDay: Utils.dateKey(new Date()),
      habits: [],
      tasks: [],
      goals: [],
      notes: [],
      plannerDays: {},   // key: date -> { blocks:[], dailyGoals:[], reflection:{wins,improve,gratitude}, mood:null }
      pomodoroSettings: { work: 25, short: 5, long: 15, cyclesBeforeLong: 4 }
    };
  }

  let state = load() || defaultState();

  function load(){
    try{
      const raw = localStorage.getItem(KEY);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      // shallow-merge with defaults so new fields introduced later don't crash old saves
      return Object.assign(defaultState(), parsed);
    }catch(e){
      console.warn('Onyx: could not read saved data, starting fresh.', e);
      return null;
    }
  }

  function persist(){
    try{
      localStorage.setItem(KEY, JSON.stringify(state));
      return true;
    }catch(e){
      console.warn('Onyx: could not save data (storage unavailable in this context).', e);
      return false;
    }
  }

  function get(){ return state; }

  function set(mutator){
    mutator(state);
    persist();
    listeners.forEach(fn => fn(state));
  }

  function subscribe(fn){ listeners.push(fn); }

  function replaceAll(newState){
    state = Object.assign(defaultState(), newState);
    persist();
    listeners.forEach(fn => fn(state));
  }

  function isFirstRun(){ return load() === null; }

  return { get, set, subscribe, persist, replaceAll, isFirstRun, defaultState, KEY };
})();

/* ---------------------------------------------------------------------- *
 * THEME — dark ("ink") / light ("paper") toggle, persisted
 * ---------------------------------------------------------------------- */
const Theme = (() => {
  function apply(theme){
    document.documentElement.setAttribute('data-theme', theme);
    const isDark = theme === 'dark';
    const icon = isDark ? Icons.get('sun') : Icons.get('moon');
    document.getElementById('themeIcon').outerHTML = icon.replace('class="icon"','class="icon" id="themeIcon"');
    document.getElementById('themeIconTop').outerHTML = icon.replace('class="icon"','class="icon" id="themeIconTop"');
    document.getElementById('themeToggleLabel').textContent = isDark ? 'Light mode' : 'Dark mode';
  }
  function toggle(){
    const s = Store.get();
    const next = s.theme === 'dark' ? 'light' : 'dark';
    Store.set(st => st.theme = next);
    apply(next);
  }
  function init(){
    apply(Store.get().theme);
    document.getElementById('themeToggle').addEventListener('click', toggle);
    document.getElementById('themeToggleTop').addEventListener('click', toggle);
  }
  return { init, apply, toggle };
})();

/* ---------------------------------------------------------------------- *
 * TOAST — small transient confirmations, bottom-right
 * ---------------------------------------------------------------------- */
const Toast = (() => {
  function show(message, opts={}){
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `${Icons.get(opts.icon || 'check')}<span>${Utils.escapeHtml(message)}</span>`;
    container.appendChild(el);
    const life = opts.duration || 2600;
    setTimeout(() => {
      el.classList.add('leaving');
      setTimeout(() => el.remove(), 200);
    }, life);
  }
  return { show };
})();

/* ---------------------------------------------------------------------- *
 * MODAL — generic dialog shell every "add/edit" form renders into
 * ---------------------------------------------------------------------- */
const Modal = (() => {
  const overlay = () => document.getElementById('modalOverlay');
  let onCloseCb = null;

  function open({ title, bodyHtml, footerHtml, onMount, onClose }){
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modalFooter').innerHTML = footerHtml || '';
    overlay().classList.add('open');
    onCloseCb = onClose || null;
    if(onMount) onMount(document.getElementById('modalBody'), document.getElementById('modalFooter'));
    const firstInput = document.querySelector('#modalBody input, #modalBody textarea, #modalBody select');
    if(firstInput) setTimeout(()=>firstInput.focus(), 60);
  }
  function close(){
    overlay().classList.remove('open');
    if(onCloseCb) onCloseCb();
    onCloseCb = null;
  }
  function init(){
    document.getElementById('modalClose').addEventListener('click', close);
    overlay().addEventListener('click', e => { if(e.target === overlay()) close(); });
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape' && overlay().classList.contains('open')) close();
    });
  }
  function confirmDialog({ title='Are you sure?', message='', confirmLabel='Delete', onConfirm }){
    open({
      title,
      bodyHtml: `<p style="font-size:13px;color:var(--c-text-dim);line-height:1.6;">${Utils.escapeHtml(message)}</p>`,
      footerHtml: `<button class="btn btn-text" id="confirmCancel">Cancel</button><button class="btn btn-danger" id="confirmYes">${Utils.escapeHtml(confirmLabel)}</button>`,
      onMount: () => {
        document.getElementById('confirmCancel').addEventListener('click', close);
        document.getElementById('confirmYes').addEventListener('click', () => { close(); onConfirm && onConfirm(); });
      }
    });
  }
  return { open, close, init, confirmDialog };
})(); — view switching, animated sidebar highlight, mobile bottom nav
 * ---------------------------------------------------------------------- */
const Nav = (() => {
  const VIEW_META = {
    dashboard: { eyebrow: 'Overview', title: 'Dashboard' },
    habits:    { eyebrow: 'Build consistency', title: 'Habits' },
    tasks:     { eyebrow: 'Get things done', title: 'Tasks' },
    planner:   { eyebrow: 'Shape your day', title: 'Planner' },
    goals:     { eyebrow: 'Aim further', title: 'Goals' },
    notes:     { eyebrow: 'Capture ideas', title: 'Notes' }
  };

  function moveHighlight(){
    const active = document.querySelector('.nav-item.active');
    const highlight = document.getElementById('navHighlight');
    if(!active || !highlight) return;
    highlight.style.transform = `translateY(${active.offsetTop}px)`;
    highlight.style.opacity = '1';
  }

  function go(view, opts={}){
    if(!VIEW_META[view]) view = 'dashboard';
    Store.set(s => s.activeView = view);

    document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === view));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
    document.querySelectorAll('.mobile-nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));

    document.getElementById('topbarEyebrow').textContent = VIEW_META[view].eyebrow;
    document.getElementById('topbarTitle').textContent = VIEW_META[view].title;

    moveHighlight();

    // lazily render the target view's content each time it's shown, so
    // it always reflects the latest state without a global re-render.
    const renderers = { dashboard: Dashboard.render, habits: Habits.render, tasks: Tasks.render, planner: Planner.render, goals: Goals.render, notes: Notes.render };
    if(renderers[view]) renderers[view]();

    if(!opts.silent) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateCounts(){
    const s = Store.get();
    const activeHabits = s.habits.filter(h => !h.archived).length;
    const openTasks = s.tasks.filter(t => !t.completed && !t.archived).length;
    document.getElementById('navCountHabits').textContent = activeHabits;
    document.getElementById('navCountTasks').textContent = openTasks;
  }

  function init(){
    document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(item => {
      item.addEventListener('click', e => { e.preventDefault(); go(item.dataset.view); });
    });
    window.addEventListener('resize', Utils.debounce(moveHighlight, 100));
    updateCounts();
    go(Store.get().activeView || 'dashboard', { silent: true });
  }

  return { go, updateCounts, init, moveHighlight };
})();

/* ---------------------------------------------------------------------- *
 * COMMAND PALETTE — ⌘K quick nav + actions + fuzzy-ish search
 * ---------------------------------------------------------------------- */
const CmdK = (() => {
  const overlay = () => document.getElementById('cmdkOverlay');
  const input = () => document.getElementById('cmdkInput');
  const results = () => document.getElementById('cmdkResults');
  let activeIndex = 0;

  function staticCommands(){
    return [
      { icon:'dots' in Icons ? 'dots' : 'bolt', label:'Go to Dashboard', hint:'View', run:()=>Nav.go('dashboard') },
      { icon:'repeat', label:'Go to Habits', hint:'View', run:()=>Nav.go('habits') },
      { icon:'checklist', label:'Go to Tasks', hint:'View', run:()=>Nav.go('tasks') },
      { icon:'calendar', label:'Go to Planner', hint:'View', run:()=>Nav.go('planner') },
      { icon:'target', label:'Go to Goals', hint:'View', run:()=>Nav.go('goals') },
      { icon:'note', label:'Go to Notes', hint:'View', run:()=>Nav.go('notes') },
      { icon:'plus', label:'New habit', hint:'Create', run:()=>{ Nav.go('habits'); Habits.openEditor(); } },
      { icon:'plus', label:'New task', hint:'Create', run:()=>{ Nav.go('tasks'); Tasks.openEditor(); } },
      { icon:'plus', label:'New goal', hint:'Create', run:()=>{ Nav.go('goals'); Goals.openEditor(); } },
      { icon:'plus', label:'New note', hint:'Create', run:()=>{ Nav.go('notes'); Notes.openEditor(); } },
      { icon:'sun', label:'Toggle theme', hint:'Appearance', run:()=>Theme.toggle() },
      { icon:'download', label:'Export data (.json)', hint:'Backup', run:()=>App.exportData() }
    ];
  }

  function searchItems(query){
    const s = Store.get();
    const q = query.toLowerCase();
    const items = [];
    s.habits.forEach(h => { if(h.name.toLowerCase().includes(q)) items.push({ icon:'repeat', label:h.name, hint:'Habit', run:()=>{ Nav.go('habits'); } }); });
    s.tasks.forEach(t => { if(t.title.toLowerCase().includes(q)) items.push({ icon:'checklist', label:t.title, hint:'Task', run:()=>{ Nav.go('tasks'); } }); });
    s.goals.forEach(g => { if(g.title.toLowerCase().includes(q)) items.push({ icon:'target', label:g.title, hint:'Goal', run:()=>{ Nav.go('goals'); } }); });
    s.notes.forEach(n => { if((n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q)) items.push({ icon:'note', label:n.title || 'Untitled note', hint:'Note', run:()=>{ Nav.go('notes'); Notes.openEditor(n.id); } }); });
    return items;
  }

  function render(query){
    const q = query.trim().toLowerCase();
    let cmds = staticCommands().filter(c => !q || c.label.toLowerCase().includes(q));
    let found = q ? searchItems(q) : [];
    activeIndex = 0;

    if(cmds.length === 0 && found.length === 0){
      results().innerHTML = `<div class="cmdk-empty">No matches for “${Utils.escapeHtml(query)}”</div>`;
      return;
    }
    let html = '';
    if(cmds.length){
      html += `<div class="cmdk-group-label">Commands</div>`;
      cmds.forEach((c,i) => html += cmdItem(c, i));
    }
    if(found.length){
      html += `<div class="cmdk-group-label">Results</div>`;
      found.forEach((c,i) => html += cmdItem(c, cmds.length + i));
    }
    results().innerHTML = html;
    results().querySelectorAll('.cmdk-item').forEach(el => {
      el.addEventListener('click', () => runByIndex(parseInt(el.dataset.idx,10), cmds.concat(found)));
    });
    highlightActive();
  }

  function cmdItem(c, idx){
    return `<div class="cmdk-item" data-idx="${idx}">${Icons.get(c.icon)}<span>${Utils.escapeHtml(c.label)}</span><span class="cmdk-item-hint">${c.hint}</span></div>`;
  }

  function highlightActive(){
    const items = results().querySelectorAll('.cmdk-item');
    items.forEach((el,i) => el.classList.toggle('active', i === activeIndex));
    const active = results().querySelector('.cmdk-item.active');
    if(active) active.scrollIntoView({ block:'nearest' });
  }

  function runByIndex(idx, all){
    const cmd = all[idx];
    if(!cmd) return;
    close();
    cmd.run();
  }

  function open(){
    overlay().classList.add('open');
    input().value = '';
    render('');
    setTimeout(()=>input().focus(), 50);
  }
  function close(){ overlay().classList.remove('open'); }

  function init(){
    document.getElementById('cmdkTrigger').addEventListener('click', open);
    document.getElementById('searchTrigger').addEventListener('click', open);
    overlay().addEventListener('click', e => { if(e.target === overlay()) close(); });
    document.addEventListener('keydown', e => {
      if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){ e.preventDefault(); overlay().classList.contains('open') ? close() : open(); }
      if(!overlay().classList.contains('open')) return;
      const all = staticCommands().filter(c=>true);
      if(e.key === 'Escape') close();
      if(e.key === 'ArrowDown'){ e.preventDefault(); const total = results().querySelectorAll('.cmdk-item').length; activeIndex = Math.min(activeIndex+1, total-1); highlightActive(); }
      if(e.key === 'ArrowUp'){ e.preventDefault(); activeIndex = Math.max(activeIndex-1, 0); highlightActive(); }
      if(e.key === 'Enter'){
        e.preventDefault();
        const cmds = staticCommands().filter(c => !input().value.trim() || c.label.toLowerCase().includes(input().value.trim().toLowerCase()));
        const found = input().value.trim() ? searchItems(input().value.trim().toLowerCase()) : [];
        runByIndex(activeIndex, cmds.concat(found));
      }
    });
    input().addEventListener('input', () => render(input().value));
  }

  return { open, close, init };
})();

/* ---------------------------------------------------------------------- *
 * DASHBOARD — the overview: greeting, live clock, stats, rings, week chart
 * ---------------------------------------------------------------------- */
const Dashboard = (() => {
  let clockTimer = null;

  function ringSvg(percent, size=56){
    const r = size === 56 ? 23 : 23;
    const c = 2 * Math.PI * r;
    const offset = c - (Utils.clamp(percent,0,100)/100) * c;
    return `<div class="ring"><svg viewBox="0 0 56 56">
        <circle class="ring-track" cx="28" cy="28" r="${r}"></circle>
        <circle class="ring-fill animate" cx="28" cy="28" r="${r}" style="stroke-dasharray:${c};stroke-dashoffset:${offset};--ring-full:${c}"></circle>
      </svg><div class="ring-label">${percent}%</div></div>`;
  }

  function greeting(){
    const h = new Date().getHours();
    if(h < 5) return 'Still up';
    if(h < 12) return 'Good morning';
    if(h < 17) return 'Good afternoon';
    if(h < 21) return 'Good evening';
    return 'Good night';
  }

  function computeStats(){
    const s = Store.get();
    const todayKey = Utils.dateKey(new Date());
    const activeHabits = s.habits.filter(h => !h.archived);
    const dueToday = activeHabits.filter(h => Habits.isDueOn(h, todayKey));
    const doneToday = dueToday.filter(h => h.completions && h.completions[todayKey]);
    const habitPct = Utils.pct(doneToday.length, dueToday.length);

    const openTasks = s.tasks.filter(t => !t.archived);
    const dueTodayTasks = openTasks.filter(t => t.dueDate === todayKey);
    const completedTodayCount = openTasks.filter(t => t.completed && t.completedAt === todayKey).length;
    const tasksTodayPct = dueTodayTasks.length ? Utils.pct(dueTodayTasks.filter(t=>t.completed).length, dueTodayTasks.length) : 0;

    let bestStreak = 0, bestHabitName = '';
    activeHabits.forEach(h => { const st = Habits.currentStreak(h); if(st > bestStreak){ bestStreak = st; bestHabitName = h.name; } });

    const last7 = [];
    for(let i = 6; i >= 0; i--){
      const key = Utils.addDays(todayKey, -i);
      const due = activeHabits.filter(h => Habits.isDueOn(h, key) && h.createdAt <= key);
      const done = due.filter(h => h.completions && h.completions[key]);
      last7.push({ key, pct: Utils.pct(done.length, due.length) });
    }
    const weeklyAvg = Math.round(last7.reduce((a,b)=>a+b.pct,0) / 7);

    return { todayKey, activeHabits, dueToday, doneToday, habitPct, openTasks, dueTodayTasks, completedTodayCount, tasksTodayPct, bestStreak, bestHabitName, last7, weeklyAvg };
  }

  function agendaHtml(stats){
    const s = Store.get();
    const day = s.plannerDays[stats.todayKey];
    const blocks = (day?.blocks || []).slice().sort((a,b) => a.start.localeCompare(b.start)).slice(0,4);
    const topTasks = stats.openTasks.filter(t => !t.completed)
      .sort((a,b) => (b.priority==='high')-(a.priority==='high') || (a.dueDate||'9999').localeCompare(b.dueDate||'9999'))
      .slice(0,4);

    let rows = '';
    if(blocks.length === 0 && topTasks.length === 0){
      rows = `<div class="empty-state" style="padding:24px 8px;">${Icons.get('sparkle')}<p>Nothing scheduled yet. Add a task or plan your day to see it here.</p></div>`;
    } else {
      blocks.forEach(b => rows += `<div class="agenda-row">${Icons.get('clock')}<span class="agenda-time">${b.start}</span><span class="agenda-title">${Utils.escapeHtml(b.title)}</span></div>`);
      topTasks.forEach(t => rows += `<div class="agenda-row">${Icons.get('checklist')}<span class="agenda-time">${t.dueDate ? Utils.relativeDay(t.dueDate) : '—'}</span><span class="agenda-title">${Utils.escapeHtml(t.title)}</span></div>`);
    }
    return rows;
  }

  function weekChartHtml(stats){
    const todayKey = stats.todayKey;
    return stats.last7.map(d => {
      const dow = Utils.DOW_SHORT[Utils.keyToDate(d.key).getDay()];
      const isToday = d.key === todayKey;
      return `<div class="week-bar-col">
          <div class="week-bar-track"><div class="week-bar-fill" style="height:${Math.max(d.pct,4)}%"></div></div>
          <div class="week-bar-day ${isToday?'today':''}">${dow}</div>
        </div>`;
    }).join('');
  }

  function render(){
    const stats = computeStats();
    const view = document.getElementById('view-dashboard');
    const name = greeting();

    view.innerHTML = `
      <div class="dash-hero">
        <div>
          <div class="dash-greeting">${name}<strong>.</strong></div>
          <div class="dash-date">
            <span>${Utils.friendlyDate(stats.todayKey)}</span>
            <span class="dash-clock" id="dashClock">--:--</span>
          </div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="panel stat-card">
          ${ringSvg(stats.habitPct)}
          <div class="stat-copy">
            <div class="stat-value">${stats.doneToday.length}<span style="color:var(--c-text-faint);font-weight:400;">/${stats.dueToday.length}</span></div>
            <div class="stat-label">Habits completed today</div>
          </div>
        </div>
        <div class="panel stat-card">
          ${ringSvg(stats.tasksTodayPct)}
          <div class="stat-copy">
            <div class="stat-value">${stats.completedTodayCount}</div>
            <div class="stat-label">Tasks completed today</div>
            <div class="stat-sub">${stats.dueTodayTasks.length} due today</div>
          </div>
        </div>
        <div class="panel stat-card">
          <div class="ring" style="display:flex;align-items:center;justify-content:center;color:var(--c-text-dim);">${Icons.get('flame')}</div>
          <div class="stat-copy">
            <div class="stat-value">${stats.bestStreak}<span style="font-size:13px;color:var(--c-text-faint);font-weight:500;"> day${stats.bestStreak===1?'':'s'}</span></div>
            <div class="stat-label">Best streak</div>
            <div class="stat-sub">${stats.bestHabitName ? Utils.escapeHtml(stats.bestHabitName) : 'Start a habit to begin'}</div>
          </div>
        </div>
        <div class="panel stat-card">
          ${ringSvg(stats.weeklyAvg)}
          <div class="stat-copy">
            <div class="stat-value">${stats.weeklyAvg}<span style="font-size:14px;">%</span></div>
            <div class="stat-label">Weekly progress</div>
            <div class="stat-sub">7-day habit average</div>
          </div>
        </div>
      </div>

      <div class="dash-grid">
        <div class="panel week-chart">
          <div class="week-chart-head"><h3>This week</h3><span>Habit completion by day</span></div>
          <div class="week-bars">${weekChartHtml(stats)}</div>
        </div>
        <div class="panel agenda-panel">
          <h3>Today at a glance</h3>
          ${agendaHtml(stats)}
        </div>
      </div>
    `;

    // live clock, self-clearing once the dashboard is no longer mounted
    if(clockTimer) clearInterval(clockTimer);
    const tick = () => {
      const el = document.getElementById('dashClock');
      if(!el){ clearInterval(clockTimer); return; }
      const now = new Date();
      el.textContent = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    };
    tick();
    clockTimer = setInterval(tick, 1000 * 15);

    Nav.updateCounts();
  }

  return { render };
})();

/* ---------------------------------------------------------------------- *
 * HABITS — create/edit/delete, daily checks, streaks, weekly grid,
 * monthly calendar, categories, search/sort, drag-drop reorder, archive
 * ---------------------------------------------------------------------- */
const Habits = (() => {
  const CATEGORIES = ['Health','Fitness','Mindfulness','Work','Learning','Personal','Finance'];
  let ui = { search:'', category:'all', sort:'order', showArchived:false, calHabitId:null, calMonth:new Date().getMonth(), calYear:new Date().getFullYear() };
  let dragId = null;

  function isDueOn(habit, key){
    if(!habit.frequency || habit.frequency === 'daily') return true;
    if(Array.isArray(habit.frequency)) return habit.frequency.includes(Utils.keyToDate(key).getDay());
    return true;
  }

  function currentStreak(habit){
    let streak = 0;
    let cursor = Utils.dateKey(new Date());
    if(isDueOn(habit, cursor) && !(habit.completions && habit.completions[cursor])){
      cursor = Utils.addDays(cursor, -1);
    }
    let guard = 0;
    while(cursor >= habit.createdAt && guard < 3660){
      guard++;
      if(isDueOn(habit, cursor)){
        if(habit.completions && habit.completions[cursor]){ streak++; cursor = Utils.addDays(cursor, -1); }
        else break;
      } else {
        cursor = Utils.addDays(cursor, -1);
      }
    }
    return streak;
  }

  function completionRate(habit, days=30){
    const today = Utils.dateKey(new Date());
    let due = 0, done = 0;
    for(let i = 0; i < days; i++){
      const key = Utils.addDays(today, -i);
      if(key < habit.createdAt) continue;
      if(isDueOn(habit, key)){ due++; if(habit.completions && habit.completions[key]) done++; }
    }
    return Utils.pct(done, due);
  }

  function weekDotsHtml(habit){
    const today = Utils.dateKey(new Date());
    const todayDow = Utils.keyToDate(today).getDay();
    const monday = Utils.addDays(today, todayDow === 0 ? -6 : 1 - todayDow);
    let html = '';
    for(let i = 0; i < 7; i++){
      const key = Utils.addDays(monday, i);
      const filled = habit.completions && habit.completions[key];
      const isToday = key === today;
      const future = key > today;
      html += `<div class="week-dot ${filled?'filled':''} ${isToday?'today':''}" style="${future?'opacity:.35':''}" title="${Utils.DOW_SHORT[Utils.keyToDate(key).getDay()]}"></div>`;
    }
    return html;
  }

  function getFiltered(){
    const s = Store.get();
    let list = s.habits.filter(h => !!h.archived === ui.showArchived);
    if(ui.search.trim()) list = list.filter(h => h.name.toLowerCase().includes(ui.search.toLowerCase()) || (h.category||'').toLowerCase().includes(ui.search.toLowerCase()));
    if(ui.category !== 'all') list = list.filter(h => h.category === ui.category);
    const today = Utils.dateKey(new Date());
    switch(ui.sort){
      case 'name': list = list.slice().sort((a,b)=>a.name.localeCompare(b.name)); break;
      case 'streak': list = list.slice().sort((a,b)=>currentStreak(b)-currentStreak(a)); break;
      case 'completion': list = list.slice().sort((a,b)=>completionRate(b)-completionRate(a)); break;
      case 'created': list = list.slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt)); break;
      default: list = list.slice().sort((a,b)=>(a.order??0)-(b.order??0));
    }
    return list;
  }

  function cardHtml(habit){
    const today = Utils.dateKey(new Date());
    const doneToday = !!(habit.completions && habit.completions[today]);
    const streak = currentStreak(habit);
    const rate = completionRate(habit);
    return `
      <div class="panel habit-card" draggable="true" data-id="${habit.id}">
        <button class="habit-check ${doneToday?'done':''}" data-action="toggle" data-id="${habit.id}">${Icons.get('check')}</button>
        <div class="habit-main">
          <div class="habit-top-row">
            <span class="habit-name ${doneToday?'done':''}">${Utils.escapeHtml(habit.name)}</span>
            <span class="priority-dot ${habit.priority}"></span>
          </div>
          <div class="habit-tags">
            ${habit.category ? `<span class="habit-cat">${Utils.escapeHtml(habit.category)}</span>` : ''}
            <span class="habit-streak">${Icons.get('flame')}${streak} day${streak===1?'':'s'}</span>
          </div>
        </div>
        <div class="week-dots">${weekDotsHtml(habit)}</div>
        <div class="habit-progress-mini">
          <div class="habit-progress-pct">${rate}%</div>
          <div class="habit-progress-bar"><div class="habit-progress-fill" style="width:${rate}%"></div></div>
        </div>
        <div class="habit-actions">
          <button class="icon-btn" data-action="calendar" data-id="${habit.id}" title="Monthly view">${Icons.get('calendar')}</button>
          <button class="icon-btn" data-action="edit" data-id="${habit.id}" title="Edit">${Icons.get('edit')}</button>
          <button class="icon-btn" data-action="archive" data-id="${habit.id}" title="${habit.archived?'Unarchive':'Archive'}">${Icons.get(habit.archived?'unarchive':'archive')}</button>
          <button class="icon-btn" data-action="delete" data-id="${habit.id}" title="Delete">${Icons.get('trash')}</button>
          <span class="icon-btn drag-handle" title="Drag to reorder">${Icons.get('grip')}</span>
        </div>
      </div>`;
  }

  function render(){
    const view = document.getElementById('view-habits');
    const s = Store.get();
    const activeCount = s.habits.filter(h=>!h.archived).length;
    const today = Utils.dateKey(new Date());
    const dueToday = s.habits.filter(h=>!h.archived && isDueOn(h,today));
    const doneToday = dueToday.filter(h=>h.completions && h.completions[today]);
    const list = getFiltered();

    const catOptions = CATEGORIES.map(c=>`<option value="${c}" ${ui.category===c?'selected':''}>${c}</option>`).join('');

    view.innerHTML = `
      <div class="view-head">
        <div class="view-head-copy">
          <h2>Habits</h2>
          <p>${activeCount} active · ${Utils.pct(doneToday.length,dueToday.length)}% completed today</p>
        </div>
        <div class="view-actions">
          <button class="btn btn-primary" id="addHabitBtn">${Icons.get('plus')}<span class="label-full">New habit</span></button>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-search">${Icons.get('search')}<input type="text" id="habitSearch" placeholder="Search habits…" value="${Utils.escapeHtml(ui.search)}"></div>
        <select class="select-pill" id="habitCategoryFilter">
          <option value="all" ${ui.category==='all'?'selected':''}>All categories</option>
          ${catOptions}
        </select>
        <select class="select-pill" id="habitSort">
          <option value="order" ${ui.sort==='order'?'selected':''}>Manual order</option>
          <option value="name" ${ui.sort==='name'?'selected':''}>Name</option>
          <option value="streak" ${ui.sort==='streak'?'selected':''}>Streak</option>
          <option value="completion" ${ui.sort==='completion'?'selected':''}>Completion rate</option>
          <option value="created" ${ui.sort==='created'?'selected':''}>Newest</option>
        </select>
        <div class="filter-pills">
          <button class="filter-pill ${!ui.showArchived?'selected':''}" id="showActivePill">Active</button>
          <button class="filter-pill ${ui.showArchived?'selected':''}" id="showArchivedPill">Archived</button>
        </div>
      </div>

      <div class="habit-list" id="habitList">
        ${list.length ? list.map(cardHtml).join('') : `<div class="empty-state panel">${Icons.get('repeat')}<p>${ui.showArchived ? 'No archived habits.' : (ui.search||ui.category!=='all' ? 'No habits match your filters.' : 'No habits yet. Add one to start building your streak.')}</p>${!ui.showArchived ? `<button class="btn btn-ghost" id="emptyAddHabit">${Icons.get('plus')} Add your first habit</button>` : ''}</div>`}
      </div>
    `;

    bindEvents();
  }

  function bindEvents(){
    const view = document.getElementById('view-habits');
    document.getElementById('addHabitBtn').addEventListener('click', () => openEditor());
    const emptyAdd = document.getElementById('emptyAddHabit');
    if(emptyAdd) emptyAdd.addEventListener('click', () => openEditor());

    document.getElementById('habitSearch').addEventListener('input', Utils.debounce(e => { ui.search = e.target.value; render(); }, 180));
    document.getElementById('habitCategoryFilter').addEventListener('change', e => { ui.category = e.target.value; render(); });
    document.getElementById('habitSort').addEventListener('change', e => { ui.sort = e.target.value; render(); });
    document.getElementById('showActivePill').addEventListener('click', () => { ui.showArchived = false; render(); });
    document.getElementById('showArchivedPill').addEventListener('click', () => { ui.showArchived = true; render(); });

    view.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if(action === 'toggle') toggleToday(id);
        if(action === 'edit') openEditor(id);
        if(action === 'archive') toggleArchive(id);
        if(action === 'delete') remove(id);
        if(action === 'calendar') openCalendar(id);
      });
    });

    // drag & drop reorder
    view.querySelectorAll('.habit-card').forEach(card => {
      card.addEventListener('dragstart', () => { dragId = card.dataset.id; card.classList.add('dragging'); });
      card.addEventListener('dragend', () => { card.classList.remove('dragging'); view.querySelectorAll('.habit-card').forEach(c=>c.classList.remove('drag-over')); });
      card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        const targetId = card.dataset.id;
        if(!dragId || dragId === targetId) return;
        reorder(dragId, targetId);
      });
    });
  }

  function reorder(dragId, targetId){
    Store.set(s => {
      const list = s.habits.filter(h=>!h.archived).slice().sort((a,b)=>(a.order??0)-(b.order??0));
      const fromIdx = list.findIndex(h=>h.id===dragId);
      const toIdx = list.findIndex(h=>h.id===targetId);
      if(fromIdx<0||toIdx<0) return;
      const [moved] = list.splice(fromIdx,1);
      list.splice(toIdx,0,moved);
      list.forEach((h,i)=>{ const ref = s.habits.find(x=>x.id===h.id); if(ref) ref.order = i; });
    });
    ui.sort = 'order';
    render();
  }

  function toggleToday(id){
    const today = Utils.dateKey(new Date());
    Store.set(s => {
      const h = s.habits.find(x=>x.id===id);
      if(!h) return;
      h.completions = h.completions || {};
      if(h.completions[today]) delete h.completions[today];
      else h.completions[today] = true;
    });
    render();
    if(document.getElementById('view-dashboard').classList.contains('active')) Dashboard.render();
  }

  function toggleArchive(id){
    Store.set(s => { const h = s.habits.find(x=>x.id===id); if(h) h.archived = !h.archived; });
    Toast.show('Habit updated');
    render();
  }

  function remove(id){
    const s = Store.get();
    const h = s.habits.find(x=>x.id===id);
    if(!h) return;
    Modal.confirmDialog({
      title: 'Delete habit?',
      message: `“${h.name}” and all of its completion history will be permanently removed.`,
      confirmLabel: 'Delete habit',
      onConfirm: () => {
        Store.set(s2 => { s2.habits = s2.habits.filter(x=>x.id!==id); });
        Toast.show('Habit deleted');
        render();
      }
    });
  }

  function openEditor(id){
    const s = Store.get();
    const editing = id ? s.habits.find(h=>h.id===id) : null;
    const freqIsCustom = editing && Array.isArray(editing.frequency);
    const selectedDays = freqIsCustom ? editing.frequency : [];

    const dowChips = Utils.DOW_SHORT.map((d,i) => `<button type="button" class="chip dow-chip ${selectedDays.includes(i)?'selected':''}" data-day="${i}">${d}</button>`).join('');
    const catChips = CATEGORIES.map(c => `<button type="button" class="chip cat-chip ${editing && editing.category===c ? 'selected':''}" data-cat="${c}">${c}</button>`).join('');

    Modal.open({
      title: editing ? 'Edit habit' : 'New habit',
      bodyHtml: `
        <div class="field"><label>Name</label><input type="text" id="hName" placeholder="e.g. Morning meditation" value="${editing ? Utils.escapeHtml(editing.name) : ''}"></div>
        <div class="field"><label>Category</label><div class="chip-group" id="hCatGroup">${catChips}</div></div>
        <div class="field"><label>Frequency</label>
          <div class="chip-group">
            <button type="button" class="chip freq-chip" data-freq="daily">Every day</button>
            <button type="button" class="chip freq-chip" data-freq="custom">Specific days</button>
          </div>
          <div class="chip-group" id="hDowGroup" style="margin-top:8px;">${dowChips}</div>
        </div>
        <div class="field"><label>Priority</label>
          <div class="chip-group">
            <button type="button" class="chip pr-chip" data-pr="low"><span class="dot"></span>Low</button>
            <button type="button" class="chip pr-chip" data-pr="medium"><span class="dot"></span>Medium</button>
            <button type="button" class="chip pr-chip" data-pr="high"><span class="dot"></span>High</button>
          </div>
        </div>
      `,
      footerHtml: `<button class="btn btn-text" id="hCancel">Cancel</button><button class="btn btn-primary" id="hSave">${editing?'Save changes':'Create habit'}</button>`,
      onMount: (body) => {
        let freq = editing ? editing.frequency : 'daily';
        let priority = editing ? editing.priority : 'medium';
        let category = editing ? editing.category : '';

        function syncFreqUI(){
          body.querySelectorAll('.freq-chip').forEach(c => c.classList.toggle('selected', c.dataset.freq === (freq==='daily'?'daily':'custom')));
          document.getElementById('hDowGroup').style.display = freq==='daily' ? 'none' : 'flex';
        }
        function syncPrUI(){ body.querySelectorAll('.pr-chip').forEach(c => c.classList.toggle('selected', c.dataset.pr === priority)); }
        function syncCatUI(){ body.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('selected', c.dataset.cat === category)); }

        body.querySelectorAll('.freq-chip').forEach(c => c.addEventListener('click', () => {
          freq = c.dataset.freq === 'daily' ? 'daily' : (Array.isArray(freq) ? freq : []);
          syncFreqUI();
        }));
        body.querySelectorAll('.dow-chip').forEach(c => c.addEventListener('click', () => {
          const day = parseInt(c.dataset.day,10);
          if(!Array.isArray(freq)) freq = [];
          if(freq.includes(day)) freq = freq.filter(d=>d!==day); else freq = freq.concat(day).sort();
          c.classList.toggle('selected');
        }));
        body.querySelectorAll('.pr-chip').forEach(c => c.addEventListener('click', () => { priority = c.dataset.pr; syncPrUI(); }));
        body.querySelectorAll('.cat-chip').forEach(c => c.addEventListener('click', () => { category = (category===c.dataset.cat) ? '' : c.dataset.cat; syncCatUI(); }));

        if(freqIsCustom){ freq = selectedDays.length ? selectedDays : []; }
        syncFreqUI(); syncPrUI(); syncCatUI();

        document.getElementById('hCancel').addEventListener('click', Modal.close);
        document.getElementById('hSave').addEventListener('click', () => {
          const name = document.getElementById('hName').value.trim();
          if(!name){ Toast.show('Give the habit a name first'); return; }
          const finalFreq = freq === 'daily' ? 'daily' : (Array.isArray(freq) && freq.length ? freq : 'daily');
          Store.set(s2 => {
            if(editing){
              Object.assign(editing, { name, category, frequency: finalFreq, priority });
            } else {
              const maxOrder = Math.max(-1, ...s2.habits.map(h=>h.order??0));
              s2.habits.push({
                id: Utils.uid('habit'), name, category, frequency: finalFreq, priority,
                createdAt: Utils.dateKey(new Date()), completions: {}, archived: false, order: maxOrder+1
              });
            }
          });
          Modal.close();
          Toast.show(editing ? 'Habit updated' : 'Habit created');
          render();
        });
      }
    });
  }

  function openCalendar(id){
    const s = Store.get();
    const habit = s.habits.find(h=>h.id===id);
    if(!habit) return;
    ui.calHabitId = id;
    const now = new Date();
    ui.calMonth = now.getMonth();
    ui.calYear = now.getFullYear();
    renderCalendarModal(habit);
  }

  function renderCalendarModal(habit){
    const first = new Date(ui.calYear, ui.calMonth, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(ui.calYear, ui.calMonth+1, 0).getDate();
    const today = Utils.dateKey(new Date());
    const rate = completionRate(habit, daysInMonth);

    let cells = '';
    Utils.DOW_SHORT.forEach(d => cells += `<div class="cal-dow">${d}</div>`);
    for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const key = `${ui.calYear}-${Utils.pad(ui.calMonth+1)}-${Utils.pad(d)}`;
      const done = habit.completions && habit.completions[key];
      const future = key > today;
      const isToday = key === today;
      cells += `<div class="cal-cell ${done?'done':''} ${isToday?'today':''} ${future?'future':''}">${d}</div>`;
    }

    Modal.open({
      title: habit.name,
      bodyHtml: `
        <div class="habit-detail-tabs">
          <button class="icon-btn" id="calPrev">${Icons.get('chevronL')}</button>
          <div style="flex:1;text-align:center;font-weight:600;font-size:13.5px;">${Utils.MONTHS[ui.calMonth]} ${ui.calYear}</div>
          <button class="icon-btn" id="calNext">${Icons.get('chevronR')}</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;color:var(--c-text-faint);">Completion this month</span>
          <span style="font-family:var(--font-mono);font-weight:700;">${rate}%</span>
        </div>
      `,
      footerHtml: `<button class="btn btn-ghost" id="calClose">Close</button>`,
      onMount: () => {
        document.getElementById('calClose').addEventListener('click', Modal.close);
        document.getElementById('calPrev').addEventListener('click', () => {
          ui.calMonth--; if(ui.calMonth<0){ ui.calMonth=11; ui.calYear--; }
          renderCalendarModal(habit);
        });
        document.getElementById('calNext').addEventListener('click', () => {
          ui.calMonth++; if(ui.calMonth>11){ ui.calMonth=0; ui.calYear++; }
          renderCalendarModal(habit);
        });
      }
    });
  }

  return { render, openEditor, isDueOn, currentStreak, completionRate, CATEGORIES };
})();
